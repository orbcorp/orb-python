# This workflow is triggered when a GitHub release is created.
# It can also be run manually to re-publish to PyPI in case it failed for some reason.
# You can run this workflow by navigating to https://www.github.com/orbcorp/orb-python/actions/workflows/publish-pypi.yml
name: Publish PyPI
on:
  workflow_dispatch:

  release:
    types: [published]

permissions:
  contents: read
  # Trusted Publishing: PyPI authenticates via the Actions OIDC token instead
  # of a stored PYPI_TOKEN secret.
  id-token: write

jobs:
  publish:
    name: publish
    runs-on: runs-on=${{ github.run_id }}/image=ubuntu24-full-x64/runner=4cpu-linux-x64/spot=false/tag=sdk-publish
    # The trusted-publisher registration names this environment; its deployment
    # branch policy restricts publishes to jobs running against main.
    environment: pypi

    steps:
      - uses: actions/checkout@v6

      # bin/publish-pypi is uv-based; the previous rye install was vestigial and
      # its bootstrap has bit-rotted (bundled uv too old). Reported to Stainless.
      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Publish to PyPI
        run: |
          bash ./bin/publish-pypi

